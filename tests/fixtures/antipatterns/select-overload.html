<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>select-overload fixture</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; font-size: 16px; }
  h1 { font-size: 40px; }
  .col { width: 600px; padding: 20px; }
  select { width: 280px; height: 36px; }
</style>
</head>
<body>
<h1>Select option-count cases</h1>

<!-- ───────────────── SHOULD FLAG ───────────────── -->
<div class="col" id="flag">

  <select aria-label="team">

  </select>
</div>

<div class="col" id="pass">
  <select aria-label="priority">
    <option>Low</option><option>Medium</option><option>High</option>
  </select>
  <select aria-label="page size">
    <option>z01</option><option>z02</option><option>z03</option><option>z04</option><option>z05</option><option>z06</option><option>z07</option><option>z08</option><option>z09</option><option>z10</option><option>z11</option><option>z12</option><option>z13</option><option>z14</option><option>z15</option><option>z16</option><option>z17</option><option>z18</option><option>z19</option><option>z20</option><option>z21</option><option>z22</option><option>z23</option><option>z24</option><option>z25</option>

  </select>
  <select aria-label="grouped catalog">

    </optgroup>
    <optgroup label="Vegetables">
      <option>v01</option><option>v02</option><option>v03</option><option>v04</option><option>v05</option><option>v06</option><option>v07</option><option>v08</option><option>v09</option><option>v10</option><option>v11</option><option>v12</option><option>v13</option><option>v14</option><option>v15</option>
    </optgroup>
  </select>
</div>

</body>
</html>
