<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>autocomplete-missing fixture</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; font-size: 16px; }
  h1 { font-size: 40px; }
  form { width: 600px; padding: 20px; }
  input { width: 280px; height: 36px; }
</style>
</head>
<body>
<h1>Autofill cases</h1>

<!-- ───────────────── SHOULD FLAG ───────────────── -->
<form id="flag-checkout" aria-label="Checkout">
  <label for="f-email">Email</label>
  <input type="email" id="f-email" name="email">
  <label for="f-phone">Phone</label>
  <input type="tel" id="f-phone" name="phone">
  <label for="f-name">Full name</label>
  <input type="text" id="f-name" name="full-name">
  <label for="f-zip">Postal code</label>
  <input type="text" id="f-zip" name="postal-code">
</form>

<!-- ───────────────── SHOULD PASS ───────────────── -->
<form id="pass-checkout" aria-label="Checkout with autofill">
  <label for="p-email">Email</label>
  <input type="email" id="p-email" name="email" autocomplete="email">
  <label for="p-phone">Phone</label>
  <input type="tel" id="p-phone" name="phone" autocomplete="tel">
  <label for="p-otp">One-time code</label>
  <input type="text" id="p-otp" name="otp" autocomplete="off">
  <label for="p-query">Search invoices</label>
  <input type="search" id="p-query" name="invoice-query">
</form>
<div>
  <input type="email" aria-label="Newsletter email outside any form">
</div>

</body>
</html>
